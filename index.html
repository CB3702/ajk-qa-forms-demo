<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AJK Site Control</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- LOGIN -->
  <section class="view active" id="view-login">
    <div class="center-shell">
      <div class="auth-card">
        <div class="auth-top">
          <div class="brand-mark">AJK</div>
          <div class="brand-copy">
            <h1>AJK Site Control</h1>
            <p>Internal QA & package control platform</p>
          </div>
        </div>

        <div class="auth-body">
          <div class="eyebrow">Sign In</div>

          <label class="field-label" for="loginUser">User</label>
          <select id="loginUser"></select>

          <label class="field-label" for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" />

          <button class="btn btn-primary" onclick="login()">Sign In</button>
        </div>
      </div>
    </div>
  </section>

  <!-- PROJECT SELECTION -->
  <section class="view" id="view-projects">
    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="brand-mark small">AJK</div>
          <div class="header-copy">
            <h2>Project Selection</h2>
            <p id="welcomeText">Welcome</p>
          </div>
        </div>
        <button class="btn btn-secondary btn-small" onclick="logout()">Log Out</button>
      </div>
    </header>

    <main class="page-shell">
      <div class="page-intro">
        <div class="eyebrow">Assigned Projects</div>
        <h3>Select a project to continue</h3>
      </div>

      <div class="card-grid" id="projectCards"></div
