<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AJK Site Control</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
<h1>AJK Site Control</h1>
<div class="user">
<label>Active User</label>
<select id="userSelect"></select>
</div>
</header>

<section class="container">

<div class="card">
<h2>Create Project</h2>
<input id="projectName" placeholder="Project name">
<button onclick="createProject()">Create</button>
</div>

<div class="card">
<h2>Projects</h2>
<select id="projectSelect"></select>
</div>

<div class="card">
<h2>Create Location</h2>
<input id="locationName" placeholder="Plot / Level / Area">
<button onclick="createLocation()">Add Location</button>
</div>

<div class="card">
<h2>Submit Form</h2>

<select id="scopeSelect">
<option value="screed">Screed</option>
<option value="cb">Cradle & Batten</option>
<option value="raf">Raised Access Floor</option>
<option value="hw">Hardwood</option>
<option value="tiling">Tiling</option>
</select>

<select id="formType">
<option>F01 Pre Pour</option>
<option>F04 SR Test</option>
<option>F05 Moisture Test</option>
</select>

<select id="locationSelect"></select>

<select id="statusSelect">
<option value="pass">Pass</option>
<option value="fail">Fail</option>
<option value="hold">Hold Point</option>
</select>

<button onclick="submitForm()">Submit</button>

</div>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Actions</h2>
<div id="actions"></div>
</div>

</section>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
